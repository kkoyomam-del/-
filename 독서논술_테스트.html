<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>나는 어떤 독서논술 동물?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* CSS 스타일은 제공해주신 디자인을 그대로 유지하며 일부 레이아웃만 보정했습니다 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #0D1B2A; color: #fff; min-height: 100vh; overflow-x: hidden; }
.jua { font-family: 'Jua', sans-serif; }

@keyframes fadeInUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
@keyframes shimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
@keyframes pop { 0% { transform:scale(1); } 50% { transform:scale(1.1); } 100% { transform:scale(1); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes spin { to { transform:rotate(360deg); } }

.fadeInUp { animation: fadeInUp 0.5s ease forwards; }
.float { animation: float 3s ease-in-out infinite; }
.shimmer-btn {
  background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4, #45B7D1, #FF6B6B);
  background-size: 200% auto;
  animation: shimmer 3s linear infinite;
}
.page { display:none; min-height:100vh; }
.page.active { display:flex; flex-direction:column; }

.card { background: rgba(255,255,255,0.07); border-radius: 20px; border: 1px solid rgba(255,255,255,0.13); backdrop-filter: blur(20px); }
.btn { width:100%; padding:14px; border-radius:14px; border:none; font-size:16px; font-weight:800; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition: all 0.15s; }
.btn:active { transform: scale(0.97); opacity:0.85; }
.btn-primary { background: linear-gradient(135deg, #FF6B6B, #FFE66D); color:#1a1a2e; }
.btn-secondary { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.25) !important; }
.btn-teal { background: linear-gradient(135deg, #4ECDC4, #44A08D); color:#fff; }

input { width:100%; padding:12px 16px; border-radius:12px; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:#fff; font-size:16px; outline:none; }
input:focus { border-color: rgba(78,205,196,0.7); }

.bal-btn { flex:1; padding:20px 14px; border-radius:20px; border:none; color:#fff; cursor:pointer; text-align:center; transition: all 0.22s ease; }
.bal-a { background: rgba(255,107,107,0.15); border:2px solid rgba(255,107,107,0.4) !important; }
.bal-b { background: rgba(78,205,196,0.15); border:2px solid rgba(78,205,196,0.4) !important; }
.bal-a.selected { background: linear-gradient(135deg,#FF6B6B,#FF8E53); border-color:#FF6B6B !important; animation:pop 0.3s ease; }
.bal-b.selected { background: linear-gradient(135deg,#4ECDC4,#44A08D); border-color:#4ECDC4 !important; animation:pop 0.3s ease; }

table { width:100%; border-collapse:collapse; font-size:12px; min-width: 400px; }
th { padding:10px 6px; color:rgba(255,255,255,0.5); border-bottom:1px solid rgba(255,255,255,0.15); }
td { padding:10px 6px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.08); }

.spinner { width:24px; height:24px; border:3px solid rgba(255,255,255,0.1); border-top-color:#FFE66D; border-radius:50%; animation:spin 0.8s linear infinite; margin: 20px auto; }
</style>
</head>
<body>

<div class="page active" id="page-home" style="background:linear-gradient(160deg,#0D1B2A 0%,#1B2A4A 50%,#162032 100%); align-items:center; justify-content:center; padding:20px;">
  <div style="max-width:420px;width:100%;text-align:center;">
    <div style="margin-bottom:8px;">
      <span class="float" style="font-size:28px;">🌟</span>
    </div>
    <div class="jua fadeInUp" style="font-size:28px;color:#FFE66D;margin-bottom:4px;">나는 어떤</div>
    <div class="jua fadeInUp" style="font-size:38px;background:linear-gradient(90deg,#FF6B6B,#FFE66D,#4ECDC4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px;">독서논술 동물?</div>
    
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:22px;" id="type-badges"></div>

    <div class="card fadeInUp" style="padding:16px;margin-bottom:16px;text-align:left;">
      <div style="color:rgba(255,255,255,0.9);font-size:13px;line-height:1.9;">
        🎯 총 <b style="color:#FFE66D;">20문항</b> · 약 <b style="color:#4ECDC4;">3분</b> 소요<br>
        🎮 나에게 더 편한 스타일을 골라보세요!
      </div>
    </div>

    <button class="btn shimmer-btn fadeInUp" style="margin-bottom:10px;" onclick="goPage('info')">🚀 테스트 시작하기!</button>
    <button class="btn btn-secondary" onclick="goPage('dash-login')">🔐 선생님 대시보드</button>
  </div>
</div>

<div class="page" id="page-info" style="background:linear-gradient(160deg,#0D1B2A,#1B2A4A); align-items:center; justify-content:center; padding:20px;">
  <div style="max-width:400px;width:100%;" class="card">
    <div style="padding:28px;">
      <div class="jua" style="font-size:26px;color:#FFE66D;text-align:center;margin-bottom:22px;">내 정보 입력</div>
      <div style="margin-bottom:13px;">
        <label style="color:rgba(255,255,255,0.8);font-size:13px;font-weight:700;display:block;margin-bottom:6px;">✏️ 학년 (숫자만)</label>
        <input id="in-grade" placeholder="예: 6" type="number">
      </div>
      <div style="margin-bottom:13px;">
        <label style="color:rgba(255,255,255,0.8);font-size:13px;font-weight:700;display:block;margin-bottom:6px;">✏️ 반 (숫자만)</label>
        <input id="in-ban" placeholder="예: 1" type="number">
      </div>
      <div style="margin-bottom:13px;">
        <label style="color:rgba(255,255,255,0.8);font-size:13px;font-weight:700;display:block;margin-bottom:6px;">✏️ 번호 (숫자만)</label>
        <input id="in-num" placeholder="예: 15" type="number">
      </div>
      <div style="margin-bottom:20px;">
        <label style="color:rgba(255,255,255,0.8);font-size:13px;font-weight:700;display:block;margin-bottom:6px;">✏️ 이름</label>
        <input id="in-name" placeholder="예: 홍길동" type="text">
      </div>
      <button class="btn btn-primary" onclick="startTest()" style="margin-bottom:10px;">시작! 🎮</button>
      <button class="btn btn-secondary" onclick="goPage('home')">뒤로가기</button>
    </div>
  </div>
</div>

<div class="page" id="page-test" style="background:linear-gradient(160deg,#0D1B2A,#1B2A4A); align-items:center; justify-content:center; padding:16px;">
  <div style="max-width:440px;width:100%;">
    <div style="text-align:center;margin-bottom:14px;">
      <div id="user-label" style="color:rgba(255,255,255,0.45);font-size:12px;margin-bottom:8px;"></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.1);overflow:hidden;">
          <div id="progress-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#FF6B6B,#FFE66D);border-radius:4px;transition:width 0.4s ease;"></div>
        </div>
        <div id="q-counter" class="jua" style="color:#FFE66D;font-size:14px;min-width:50px;">1 / 20</div>
      </div>
    </div>

    <div class="card fadeInUp" style="padding:24px 20px;margin-bottom:14px;text-align:center;">
      <div id="q-emoji" style="font-size:48px;margin-bottom:10px;"></div>
      <div class="jua" id="q-num-label" style="color:#FFE66D;font-size:16px;margin-bottom:4px;"></div>
      <div class="jua" style="color:#fff;font-size:18px;">나에게 더 가까운 건?</div>
    </div>

    <div style="display:flex;gap:12px;align-items:stretch;margin-bottom:14px;">
      <button class="bal-btn bal-a" id="btn-a" onclick="handleChoice('a')">
        <div style="font-size:28px;margin-bottom:8px;">🅰️</div>
        <div id="q-a" style="font-size:14px;font-weight:700;line-height:1.5;"></div>
      </button>
      <div style="display:flex;align-items:center;"><div class="jua" style="background:linear-gradient(135deg,#FFE66D,#FF6B6B);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;color:#1a1a2e;font-size:13px;font-weight:900;">VS</div></div>
      <button class="bal-btn bal-b" id="btn-b" onclick="handleChoice('b')">
        <div style="font-size:28px;margin-bottom:8px;">🅱️</div>
        <div id="q-b" style="font-size:14px;font-weight:700;line-height:1.5;"></div>
      </button>
    </div>
    <div id="q-dots" style="display:flex;justify-content:center;flex-wrap:wrap;gap:4px;"></div>
  </div>
</div>

<div class="page" id="page-result" style="background:linear-gradient(160deg,#0D1B2A,#1B2A4A); padding:16px;">
  <div style="max-width:480px;margin:0 auto;padding:16px 0;">
    <div id="result-header" style="border-radius:24px;padding:28px 20px;text-align:center;margin-bottom:14px;"></div>
    <div class="card" style="padding:20px;margin-bottom:12px;" id="result-axes"></div>
    <div id="result-detail" style="border-radius:20px;padding:20px;margin-bottom:12px;border-width:2px;border-style:solid;"></div>
    <div class="card" style="padding:16px;margin-bottom:12px;" id="result-strength"></div>
    <div id="save-status" style="text-align:center;font-size:13px;margin-bottom:12px;color:#4ECDC4;">✅ 결과 전송 완료!</div>
    <button class="btn btn-teal" onclick="location.reload()">처음으로 돌아가기 🏠</button>
  </div>
</div>

<div class="page" id="page-dash-login" style="background:linear-gradient(160deg,#0D1B2A,#1B2A4A); align-items:center; justify-content:center; padding:20px;">
  <div class="card" style="max-width:380px;width:100%;padding:28px;text-align:center;">
    <div class="jua" style="color:#FFE66D;font-size:24px;margin-bottom:20px;">선생님 대시보드</div>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" style="margin-bottom:12px;" onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="color:#FF6B6B;font-size:13px;margin-bottom:8px;display:none;">비밀번호가 틀렸어요 🙅</div>
    <button class="btn btn-primary" onclick="checkPw()" style="margin-bottom:10px;">입장하기</button>
    
    <div style="margin-top:20px;padding:14px;background:rgba(255,230,109,0.08);border-radius:12px;border:1px solid rgba(255,230,109,0.2);">
      <div style="color:#FFE66D;font-size:12px;font-weight:700;margin-bottom:8px;">⚙️ 연동 설정</div>
      <input type="text" id="script-url-input" placeholder="Google Apps Script URL 입력" style="font-size:11px;margin-bottom:6px;">
      <button class="btn btn-secondary" style="padding:8px;font-size:12px;" onclick="saveUrlDirectly()">설정 저장</button>
      <div id="url-saved-msg" style="color:#4ECDC4;font-size:11px;display:none;margin-top:5px;">✅ URL 저장 완료!</div>
    </div>
    <button class="btn btn-secondary" style="margin-top:10px;" onclick="goPage('home')">뒤로</button>
  </div>
</div>

<div class="page" id="page-dashboard" style="background:linear-gradient(160deg,#0D1B2A,#1B2A4A); padding:16px;">
  <div style="max-width:640px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="jua" style="color:#FFE66D;font-size:22px;">📊 대시보드</div>
      <div style="display:flex;gap:8px;">
        <button onclick="loadDash()" style="padding:8px 14px;border-radius:10px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);cursor:pointer;">🔄 갱신</button>
        <button onclick="goPage('home')" style="padding:8px 14px;border-radius:10px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);cursor:pointer;">나가기</button>
      </div>
    </div>
    <div id="dash-count" style="color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:10px;">데이터 불러오는 중...</div>

    <div class="card" style="padding:16px;margin-bottom:12px;">
      <div class="jua" style="color:#FFE66D;font-size:15px;margin-bottom:10px;">🐾 유형 분포</div>
      <div id="type-dist" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
    </div>

    <div class="card" style="padding:16px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="jua" style="color:#FFE66D;font-size:15px;">👥 학생 결과</div>
        <select id="ban-filter" onchange="filterTable()" style="background:#1B2A4A;color:#fff;padding:4px;border-radius:5px;">
          <option value="all">전체 보기</option>
        </select>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>학년</th><th>반</th><th>번</th><th>이름</th><th>유형</th></tr></thead>
          <tbody id="result-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="card" style="padding:16px;margin-bottom:12px;">
      <div class="jua" style="color:#FFE66D;font-size:15px;margin-bottom:10px;">📝 수업 참고 메모 (유형별 명단)</div>
      <div id="lesson-memo" style="font-size:13px; line-height:1.6; color:rgba(255,255,255,0.8);"></div>
    </div>
  </div>
</div>

let state = { qIdx: 0, scores: {R:0,W:0,D:0,B:0,E:0,L:0,P:0,F:0}, results: [] };

function getScriptUrl() { return localStorage.getItem("script_url") || ""; }

function saveUrlDirectly() {
  const v = document.getElementById("script-url-input").value.trim();
  localStorage.setItem("script_url", v);
  const msg = document.getElementById("url-saved-msg");
  msg.style.display = "block";
  setTimeout(() => msg.style.display = "none", 1500);
}

function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo(0,0);
}

// --- 테스트 로직 ---
function startTest() {
  const g = document.getElementById('in-grade').value.trim();
  const b = document.getElementById('in-ban').value.trim();
  const n = document.getElementById('in-num').value.trim();
  const nm = document.getElementById('in-name').value.trim();
  if(!g || !b || !n || !nm) { alert("정보를 모두 입력해주세요!"); return; }
  state = { grade:g, ban:b, num:n, name:nm, qIdx:0, scores:{R:0,W:0,D:0,B:0,E:0,L:0,P:0,F:0} };
  renderQ();
  goPage('test');
}

function renderQ() {
  const q = QUESTIONS[state.qIdx];
  document.getElementById('progress-bar').style.width = ((state.qIdx / QUESTIONS.length) * 100) + '%';
  document.getElementById('q-counter').textContent = (state.qIdx + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('user-label').textContent = `${state.grade}-${state.ban}-${state.num} ${state.name}`;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-num-label').textContent = `질문 ${state.qIdx+1}`;
  document.getElementById('q-a').textContent = q.a;
  document.getElementById('q-b').textContent = q.b;
  document.getElementById('btn-a').className = "bal-btn bal-a";
  document.getElementById('btn-b').className = "bal-btn bal-b";
  
  const dots = document.getElementById('q-dots');
  dots.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement('div');
    d.style.width = '8px'; d.style.height = '8px'; d.style.borderRadius = '50%';
    d.style.background = i < state.qIdx ? '#4ECDC4' : (i === state.qIdx ? '#FFE66D' : 'rgba(255,255,255,0.2)');
    dots.appendChild(d);
  });
}

function handleChoice(ab) {
  const q = QUESTIONS[state.qIdx];
  const dir = ab === 'a' ? q.aDir : q.bDir;
  state.scores[dir]++;
  document.getElementById('btn-'+ab).classList.add('selected');
  
  setTimeout(() => {
    if(state.qIdx < QUESTIONS.length - 1) {
      state.qIdx++;
      renderQ();
    } else {
      showResult();
    }
  }, 300);
}

function getTypeKey(sc) {
  return (sc.R >= sc.W ? "R" : "W") + (sc.D >= sc.B ? "D" : "B") + (sc.E >= sc.L ? "E" : "L") + (sc.P >= sc.F ? "P" : "F");
}

async function showResult() {
  const key = getTypeKey(state.scores);
  const t = TYPES[key] || TYPES["RBEF"];
  
  document.getElementById('result-header').style.cssText = `background:${t.bg}; border:3px solid ${t.border}; color:${t.color};`;
  document.getElementById('result-header').innerHTML = `
    <div style="font-size:60px; margin-bottom:10px;">${t.animal}</div>
    <div class="jua" style="font-size:28px;">${t.name}</div>
    <div style="font-size:14px; opacity:0.8; margin-top:5px;">${t.tag}</div>
  `;

  const axes = [
    { l:"읽기파", r:"쓰기파", lv:state.scores.R, rv:state.scores.W },
    { l:"깊이파", r:"넓이파", lv:state.scores.D, rv:state.scores.B },
    { l:"감성파", r:"논리파", lv:state.scores.E, rv:state.scores.L },
    { l:"계획파", r:"자유파", lv:state.scores.P, rv:state.scores.F }
  ];

  document.getElementById('result-axes').innerHTML = axes.map(a => {
    const pct = Math.round((a.rv / (a.lv + a.rv)) * 100);
    return `<div style="margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px;"><span>${a.l}</span><span>${a.r}</span></div>
      <div style="height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;">
        <div style="width:${pct}%; height:100%; background:linear-gradient(90deg,#4ECDC4,#FF6B6B);"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('result-detail').style.borderColor = t.border;
  document.getElementById('result-detail').style.background = t.bg;
  document.getElementById('result-detail').innerHTML = `
    <div style="color:#333; font-size:14px; line-height:1.6; margin-bottom:15px;">${t.desc}</div>
    <div style="background:rgba(255,255,255,0.5); padding:10px; border-radius:10px; color:#333; font-size:13px; margin-bottom:8px;">${t.tip}</div>
    <div style="background:rgba(255,255,255,0.5); padding:10px; border-radius:10px; color:#333; font-size:13px;">${t.books}</div>
  `;

  document.getElementById('result-strength').innerHTML = `<div style="font-size:14px; color:#FFE66D;">💪 나의 강점: ${t.strength}</div>`;
  
  goPage('result');
  
  // 서버 저장
  const url = getScriptUrl();
  if(url) {
    try {
      const params = new URLSearchParams({
        action: "save",
        grade: state.grade, ban: state.ban, num: state.num, name: state.name,
        typeKey: key, typeName: t.name, scores: JSON.stringify(state.scores)
      });
      await fetch(url + "?" + params.toString());
    } catch(e) { console.error("저장 실패", e); }
  }
}

// --- 선생님 대시보드 ---
let allResults = [];
function checkPw() {
  if(document.getElementById('pw-input').value === TEACHER_PW) {
    goPage('dashboard');
    loadDash();
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

async function loadDash() {
  const url = getScriptUrl();
  if(!url) { alert("연동 URL을 먼저 설정해주세요."); return; }
  
  document.getElementById('dash-count').textContent = "데이터 불러오는 중... ⏳";
  try {
    const res = await fetch(url + "?action=load");
    const json = await res.json();
    if(json.ok) {
      allResults = json.data;
      renderDash();
    }
  } catch(e) { 
    document.getElementById('dash-count').textContent = "데이터를 가져오지 못했습니다.";
  }
}

function renderDash() {
  document.getElementById('dash-count').textContent = `총 ${allResults.length}명의 학생이 참여했습니다.`;
  
  // 필터 업데이트
  const bans = [...new Set(allResults.map(r => r.ban))].sort((a,b)=>a-b);
  const filter = document.getElementById('ban-filter');
  filter.innerHTML = '<option value="all">전체 보기</option>' + bans.map(b => `<option value="${b}">${b}반</option>`).join('');

  // 유형 분포
  const dist = {};
  allResults.forEach(r => dist[r.typeKey] = (dist[r.typeKey] || 0) + 1);
  
  document.getElementById('type-dist').innerHTML = Object.entries(TYPES).map(([key, t]) => {
    const count = dist[key] || 0;
    return `<div class="card" style="padding:10px; text-align:center;">
      <div style="font-size:20px;">${t.animal}</div>
      <div style="font-size:11px; margin:4px 0;">${t.name}</div>
      <div style="color:#FFE66D; font-weight:800;">${count}명</div>
    </div>`;
  }).join('');

  // 메모 업데이트
  const memo = {};
  allResults.forEach(r => {
    if(!memo[r.typeKey]) memo[r.typeKey] = [];
    memo[r.typeKey].push(r.name);
  });
  document.getElementById('lesson-memo').innerHTML = Object.entries(memo).map(([key, names]) => {
    return `<div style="margin-bottom:8px;"><b>${TYPES[key]?.animal} ${TYPES[key]?.name}:</b> ${names.join(', ')}</div>`;
  }).join('');

  filterTable();
}

function filterTable() {
  const val = document.getElementById('ban-filter').value;
  const filtered = val === 'all' ? allResults : allResults.filter(r => String(r.ban) === val);
  
  document.getElementById('result-tbody').innerHTML = filtered.map(r => `
    <tr>
      <td>${r.grade}</td><td>${r.ban}</td><td>${r.num}</td>
      <td style="font-weight:bold;">${r.name}</td>
      <td>${TYPES[r.typeKey]?.animal} ${TYPES[r.typeKey]?.name || '정보없음'}</td>
    </tr>
  `).join('');
}

// 초기 배지 생성
window.onload = () => {
  document.getElementById('type-badges').innerHTML = Object.values(TYPES).map(t => 
    `<div style="background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:15px; font-size:12px;">${t.animal} ${t.name}</div>`
  ).join('');
  
  const savedUrl = getScriptUrl();
  if(savedUrl) document.getElementById('script-url-input').value = savedUrl;
};
